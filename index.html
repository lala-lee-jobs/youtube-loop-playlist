<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube 清單循環播放器</title>
    <script src="https://www.youtube.com/iframe_api" defer></script>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #22c55e;
        --accent-hover: #16a34a;
        --danger: #ef4444;
        --preview-action-gap: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        background: radial-gradient(circle at top right, #1f2937, var(--bg));
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 24px;
      }

      .container {
        width: 100%;
        max-width: 980px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .card {
        background: color-mix(in oklab, var(--panel) 85%, black);
        border: 1px solid #374151;
        border-radius: 14px;
        padding: 16px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      textarea,
      input,
      select {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #4b5563;
        background: #030712;
        color: var(--text);
        padding: 10px 12px;
        font-size: 0.95rem;
      }

      textarea {
        min-height: 160px;
        resize: vertical;
        line-height: 1.4;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }

      .saved-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 12px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
      }

      #startBtn {
        background: var(--accent);
        color: #052e16;
      }

      #startBtn:hover {
        background: var(--accent-hover);
      }

      #nextBtn {
        background: #1d4ed8;
        color: #dbeafe;
      }

      #stopBtn {
        background: #374151;
        color: #f9fafb;
      }

      #saveBtn,
      #loadBtn,
      #importBtn,
      #exportBtn {
        background: #0ea5e9;
        color: #e0f2fe;
      }

      #deleteBtn {
        background: #b91c1c;
        color: #fee2e2;
      }

      .status {
        margin-top: 10px;
        font-size: 0.92rem;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      .player-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #000;
        border-radius: 12px;
        overflow: hidden;
      }

      #player {
        width: 100%;
        height: 100%;
      }

      .meta {
        margin-top: 10px;
        font-size: 0.95rem;
      }

      .preview-summary {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .preview-grid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 12px;
      }

      .preview-item {
        position: relative;
        border: 1px solid #374151;
        border-radius: 10px;
        overflow: hidden;
        background: #030712;
        cursor: grab;
      }

      .preview-item.dragging {
        opacity: 0.55;
      }

      .preview-item.drag-over {
        border-color: #22c55e;
      }

      .preview-link {
        display: block;
        text-decoration: none;
        padding-top: var(--preview-action-gap);
      }

      .preview-link img {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        display: block;
      }

      .preview-title {
        display: block;
        padding: 8px 10px 4px;
        color: var(--text);
        font-size: 0.82rem;
        line-height: 1.35;
      }

      .preview-id {
        display: block;
        padding: 0 10px 10px;
        color: var(--muted);
        font-size: 0.74rem;
      }

      .preview-delete {
        all: unset;
        box-sizing: border-box;
        position: absolute;
        top: 8px;
        right: 8px;
        width: 30px;
        height: 30px;
        border-radius: 999px;
        background: rgba(185, 28, 28, 0.9);
        color: #fee2e2;
        font-weight: 800;
        font-size: 20px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 3;
        cursor: pointer;
        opacity: 0.75;
        transition: opacity 0.15s ease, transform 0.15s ease;
        pointer-events: auto;
      }

      .preview-delete:hover,
      .preview-delete:focus-visible {
        opacity: 1;
        transform: scale(1.06);
      }

      code {
        background: #111827;
        padding: 1px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>YouTube 清單循環播放器</h1>
        <p>每行貼一個 YouTube 連結（或直接貼影片 ID），按「開始播放」後會自動循環。</p>
      </section>

      <section class="card">
        <textarea
          id="urlInput"
          placeholder="https://www.youtube.com/watch?v=dQw4w9WgXcQ
https://youtu.be/3JZ_D3ELwOQ
https://www.youtube.com/shorts/aqz-KE-bpKQ"
        ></textarea>

        <div class="controls">
          <button id="startBtn">開始播放</button>
          <button id="nextBtn" type="button">下一支</button>
          <button id="stopBtn" type="button">停止</button>
        </div>

        <div class="saved-row">
          <input id="listNameInput" type="text" placeholder="輸入清單名稱（例如：睡前歌單）" />
          <select id="savedListSelect">
            <option value="">請選擇已儲存清單</option>
          </select>
        </div>

        <div class="controls">
          <button id="saveBtn" type="button">儲存目前清單</button>
          <button id="loadBtn" type="button">載入選取清單</button>
          <button id="deleteBtn" type="button">刪除選取清單</button>
          <button id="importBtn" type="button">匯入記事本(txt)</button>
          <button id="exportBtn" type="button">匯出目前清單(txt)</button>
          <input id="fileInput" type="file" accept=".txt,text/plain" hidden />
        </div>

        <div id="status" class="status">尚未開始播放。</div>
      </section>

      <section class="card">
        <div class="player-wrap">
          <div id="player"></div>
        </div>
        <div id="meta" class="meta">目前播放：<code>-</code></div>
      </section>

      <section class="card">
        <div id="previewSummary" class="preview-summary">影片預覽：尚無清單</div>
        <div id="previewGrid" class="preview-grid"></div>
      </section>

    </main>

    <script>
      const STORAGE_KEY = "yt-loop-player-saved-lists";
      const PLAYBACK_STATE_KEY = "yt-loop-player-playback-state";

      let ytPlayer;
      let queue = [];
      let currentIndex = 0;
      let apiReady = false;
      let pendingStart = false;
      let playbackSaveTimer = null;
      let currentPreviewIds = [];
      let draggingIndex = -1;
      const videoTitleCache = new Map();

      const statusEl = document.getElementById("status");
      const metaEl = document.getElementById("meta");
      const inputEl = document.getElementById("urlInput");
      const listNameInput = document.getElementById("listNameInput");
      const savedListSelect = document.getElementById("savedListSelect");
      const fileInput = document.getElementById("fileInput");
      const previewSummaryEl = document.getElementById("previewSummary");
      const previewGridEl = document.getElementById("previewGrid");

      const startBtn = document.getElementById("startBtn");
      const nextBtn = document.getElementById("nextBtn");
      const stopBtn = document.getElementById("stopBtn");
      const saveBtn = document.getElementById("saveBtn");
      const loadBtn = document.getElementById("loadBtn");
      const deleteBtn = document.getElementById("deleteBtn");
      const importBtn = document.getElementById("importBtn");
      const exportBtn = document.getElementById("exportBtn");

      let savedLists = {};

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      }

      function initPlaybackPersistenceEvents() {
        window.addEventListener("pagehide", () => {
          writePlaybackState();
        });

        window.addEventListener("beforeunload", () => {
          writePlaybackState();
        });

        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "hidden") {
            writePlaybackState();
          }
        });
      }

      function readPlaybackState() {
        try {
          const raw = localStorage.getItem(PLAYBACK_STATE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : null;
        } catch (_) {
          return null;
        }
      }

      function writePlaybackState() {
        try {
          const parsedFromInput = parseQueue(inputEl.value);
          const effectiveQueue = queue.length ? queue : parsedFromInput;
          if (!effectiveQueue.length) return;

          const safeIndex = queue.length
            ? Math.max(0, Math.min(currentIndex, queue.length - 1))
            : 0;

          let currentTime = 0;
          let playerState = -1;
          if (ytPlayer && typeof ytPlayer.getCurrentTime === "function") {
            currentTime = Number(ytPlayer.getCurrentTime()) || 0;
          }
          if (ytPlayer && typeof ytPlayer.getPlayerState === "function") {
            playerState = Number(ytPlayer.getPlayerState());
          }

          localStorage.setItem(
            PLAYBACK_STATE_KEY,
            JSON.stringify({
              inputText: inputEl.value,
              listName: listNameInput.value || "",
              queue: effectiveQueue,
              currentIndex: safeIndex,
              currentTime: Math.max(0, Math.floor(currentTime)),
              playerState,
              updatedAt: Date.now(),
            })
          );
        } catch (_) {}
      }

      function restoreDraftFromPlaybackState() {
        const snapshot = readPlaybackState();
        if (!snapshot) return;

        if (!inputEl.value.trim() && typeof snapshot.inputText === "string") {
          inputEl.value = snapshot.inputText;
        }
        if (!listNameInput.value.trim() && typeof snapshot.listName === "string") {
          listNameInput.value = snapshot.listName;
        }
      }

      function tryResumePlayback() {
        const snapshot = readPlaybackState();
        if (!snapshot || !apiReady || !ytPlayer) return false;

        // 只恢復最近 24 小時內的播放，避免載入過舊狀態。
        const updatedAt = Number(snapshot.updatedAt) || 0;
        if (!updatedAt || Date.now() - updatedAt > 24 * 60 * 60 * 1000) {
          return false;
        }

        const sourceText =
          typeof snapshot.inputText === "string" && snapshot.inputText.trim()
            ? snapshot.inputText
            : inputEl.value;
        const parsed = parseQueue(sourceText);
        if (!parsed.length) return false;

        inputEl.value = sourceText;
        if (typeof snapshot.listName === "string" && snapshot.listName.trim()) {
          listNameInput.value = snapshot.listName;
        }

        queue = parsed;
        renderPreview(queue);
        currentIndex = Math.max(0, Math.min(Number(snapshot.currentIndex) || 0, queue.length - 1));
        renderMeta();

        const videoId = queue[currentIndex];
        const startSeconds = Math.max(0, Number(snapshot.currentTime) || 0);
        const state = Number(snapshot.playerState);

        if (state === YT.PlayerState.PAUSED || state === YT.PlayerState.CUED) {
          ytPlayer.cueVideoById({ videoId, startSeconds });
          setStatus(`已還原播放清單，停在第 ${currentIndex + 1} 支 ${startSeconds} 秒。`);
        } else {
          ytPlayer.loadVideoById({ videoId, startSeconds });
          setStatus(`已自動續播：第 ${currentIndex + 1} 支，從 ${startSeconds} 秒繼續。`);
        }

        return true;
      }

      function startPlaybackFromInput() {
        queue = parseQueue(inputEl.value);
        renderPreview(queue);

        if (!queue.length) {
          setStatus("沒有解析到有效的 YouTube 連結或影片 ID。", true);
          renderMeta();
          return;
        }

        if (!apiReady || !ytPlayer) {
          pendingStart = true;
          setStatus("YouTube API 載入中，完成後會自動開始播放。");
          return;
        }

        pendingStart = false;
        currentIndex = 0;
        renderMeta();
        playAt(0);
      }

      function loadSavedLists() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          savedLists = raw ? JSON.parse(raw) : {};
        } catch (_) {
          savedLists = {};
        }
      }

      function persistSavedLists() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(savedLists));
      }

      function refreshSavedListOptions(selectedName = "") {
        savedListSelect.innerHTML = '<option value="">請選擇已儲存清單</option>';
        const names = Object.keys(savedLists).sort((a, b) => a.localeCompare(b, "zh-Hant"));

        for (const name of names) {
          const option = document.createElement("option");
          option.value = name;
          option.textContent = name;
          savedListSelect.appendChild(option);
        }

        if (selectedName && savedLists[selectedName]) {
          savedListSelect.value = selectedName;
        }
      }

      function extractVideoId(line) {
        const value = line.trim().replace(/^\d+\.\s*/, "");
        if (!value) return null;

        if (/^[a-zA-Z0-9_-]{11}$/.test(value)) {
          return value;
        }

        try {
          const url = new URL(value);

          if (url.hostname.includes("youtu.be")) {
            const id = url.pathname.split("/").filter(Boolean)[0];
            return id && id.length === 11 ? id : null;
          }

          if (url.searchParams.get("v")) {
            const id = url.searchParams.get("v");
            return id && id.length === 11 ? id : null;
          }

          const parts = url.pathname.split("/").filter(Boolean);
          const shortsIndex = parts.indexOf("shorts");
          if (shortsIndex >= 0 && parts[shortsIndex + 1]) {
            const id = parts[shortsIndex + 1];
            return id.length === 11 ? id : null;
          }

          const embedIndex = parts.indexOf("embed");
          if (embedIndex >= 0 && parts[embedIndex + 1]) {
            const id = parts[embedIndex + 1];
            return id.length === 11 ? id : null;
          }
        } catch (_) {
          return null;
        }

        return null;
      }

      function parseQueue(rawText) {
        const lines = rawText
          .split(/\r?\n/)
          .map((line) => line.trim().replace(/^\d+\.\s*/, ""))
          .filter(Boolean);

        const ids = [];
        for (const line of lines) {
          const id = extractVideoId(line);
          if (id) ids.push(id);
        }

        return [...new Set(ids)];
      }

      function idsToInputText(ids) {
        return ids.map((id) => `https://www.youtube.com/watch?v=${id}`).join("\n");
      }

      function addNumberLabelsToInput() {
        const rawLines = inputEl.value
          .split(/\r?\n/)
          .map((line) => line.trim().replace(/^\d+\.\s*/, ""))
          .filter(Boolean);

        if (!rawLines.length) {
          inputEl.value = "";
          return;
        }

        inputEl.value = rawLines.map((line, index) => `${index + 1}. ${line}`).join("\n");
      }

      function syncPlaylistFromPreview(ids) {
        const nextIds = [...ids];
        const currentVideoId = queue[currentIndex];

        currentPreviewIds = nextIds;
        inputEl.value = idsToInputText(nextIds);
        addNumberLabelsToInput();
        queue = [...nextIds];

        if (!queue.length) {
          if (ytPlayer && typeof ytPlayer.stopVideo === "function") {
            ytPlayer.stopVideo();
          }
          currentIndex = 0;
          renderMeta();
          writePlaybackState();
          renderPreview(queue);
          return;
        }

        if (currentVideoId) {
          const newIndex = queue.indexOf(currentVideoId);
          if (newIndex >= 0) {
            currentIndex = newIndex;
          } else {
            currentIndex = Math.min(currentIndex, queue.length - 1);
          }
        } else {
          currentIndex = Math.min(currentIndex, queue.length - 1);
        }

        renderMeta();
        writePlaybackState();
        autoSaveSelectedListFromInput();
        renderPreview(queue);
      }

      function autoSaveSelectedListFromInput() {
        const selectedName = savedListSelect.value;
        if (!selectedName || !savedLists[selectedName]) return;

        savedLists[selectedName] = {
          content: inputEl.value.trim(),
          updatedAt: new Date().toISOString(),
        };
        persistSavedLists();
        refreshSavedListOptions(selectedName);
      }

      async function fetchVideoTitle(id) {
        if (videoTitleCache.has(id)) return videoTitleCache.get(id);

        const endpoint = `https://www.youtube.com/oembed?url=${encodeURIComponent(`https://www.youtube.com/watch?v=${id}`)}&format=json`;
        try {
          const res = await fetch(endpoint);
          if (!res.ok) throw new Error("oEmbed request failed");
          const data = await res.json();
          const title = data && data.title ? data.title : id;
          videoTitleCache.set(id, title);
          return title;
        } catch (_) {
          const fallback = id;
          videoTitleCache.set(id, fallback);
          return fallback;
        }
      }

      function reorderPreviewItem(fromIndex, toIndex) {
        if (fromIndex === toIndex) return;
        if (fromIndex < 0 || toIndex < 0) return;
        if (fromIndex >= currentPreviewIds.length || toIndex >= currentPreviewIds.length) return;

        const next = [...currentPreviewIds];
        const [moved] = next.splice(fromIndex, 1);
        next.splice(toIndex, 0, moved);
        syncPlaylistFromPreview(next);
        setStatus(`已調整順序：第 ${fromIndex + 1} 支移到第 ${toIndex + 1} 位。`);
      }

      function removePreviewItem(index) {
        if (index < 0 || index >= currentPreviewIds.length) return;
        const next = [...currentPreviewIds];
        next.splice(index, 1);
        syncPlaylistFromPreview(next);
        setStatus("已從清單刪除該影片。");
      }

      function renderPreview(ids) {
        currentPreviewIds = [...ids];
        previewGridEl.innerHTML = "";

        if (!ids.length) {
          previewSummaryEl.textContent = "影片預覽：尚無清單";
          return;
        }

        previewSummaryEl.textContent = `影片預覽：共 ${ids.length} 支`;

        for (let i = 0; i < ids.length; i += 1) {
          const id = ids[i];
          const item = document.createElement("div");
          item.className = "preview-item";
          item.draggable = true;

          item.addEventListener("dragstart", (event) => {
            draggingIndex = i;
            item.classList.add("dragging");
            if (event.dataTransfer) {
              event.dataTransfer.effectAllowed = "move";
              event.dataTransfer.setData("text/plain", String(i));
            }
          });

          item.addEventListener("dragend", () => {
            draggingIndex = -1;
            item.classList.remove("dragging");
            const highlighted = previewGridEl.querySelectorAll(".drag-over");
            for (const node of highlighted) node.classList.remove("drag-over");
          });

          item.addEventListener("dragover", (event) => {
            event.preventDefault();
            item.classList.add("drag-over");
          });

          item.addEventListener("dragleave", () => {
            item.classList.remove("drag-over");
          });

          item.addEventListener("drop", (event) => {
            event.preventDefault();
            item.classList.remove("drag-over");
            const from = draggingIndex;
            const to = i;
            reorderPreviewItem(from, to);
          });

          const link = document.createElement("a");
          link.className = "preview-link";
          link.href = `https://www.youtube.com/watch?v=${id}`;
          link.target = "_blank";
          link.rel = "noopener noreferrer";

          const img = document.createElement("img");
          img.src = `https://i.ytimg.com/vi/${id}/mqdefault.jpg`;
          img.alt = `影片預覽 ${i + 1}`;
          img.loading = "lazy";

          const titleEl = document.createElement("span");
          titleEl.className = "preview-title";
          titleEl.dataset.videoId = id;
          titleEl.textContent = "載入標題中...";

          const idEl = document.createElement("span");
          idEl.className = "preview-id";
          idEl.textContent = `#${i + 1}  ${id}`;

          const deleteBtn = document.createElement("button");
          deleteBtn.type = "button";
          deleteBtn.className = "preview-delete";
          deleteBtn.textContent = "X";
          deleteBtn.title = "從清單刪除";
          deleteBtn.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            removePreviewItem(i);
          });

          link.appendChild(img);
          link.appendChild(titleEl);
          link.appendChild(idEl);
          item.appendChild(link);
          item.appendChild(deleteBtn);
          previewGridEl.appendChild(item);

          fetchVideoTitle(id).then((title) => {
            if (titleEl.dataset.videoId === id) {
              titleEl.textContent = title;
            }
          });
        }
      }

      function refreshPreviewFromInput() {
        renderPreview(parseQueue(inputEl.value));
      }

      function renderMeta() {
        if (!queue.length) {
          metaEl.innerHTML = "目前播放：<code>-</code>";
          return;
        }

        metaEl.innerHTML = `目前播放：第 <code>${currentIndex + 1}</code> / <code>${queue.length}</code> 支，ID <code>${queue[currentIndex]}</code>`;
      }

      function playAt(index) {
        if (!ytPlayer || !queue.length) return;
        currentIndex = (index + queue.length) % queue.length;
        const videoId = queue[currentIndex];
        ytPlayer.loadVideoById(videoId);
        renderMeta();
        writePlaybackState();
        setStatus(`正在播放第 ${currentIndex + 1} 支影片。`);
      }

      function nextVideo() {
        if (!queue.length) {
          setStatus("清單是空的，請先貼上連結。", true);
          return;
        }
        playAt(currentIndex + 1);
      }

      function stopVideo() {
        if (ytPlayer && typeof ytPlayer.stopVideo === "function") {
          ytPlayer.stopVideo();
          writePlaybackState();
          setStatus("已停止播放。");
        }
      }

      function saveCurrentList() {
        const name = listNameInput.value.trim();
        const content = inputEl.value.trim();

        if (!name) {
          setStatus("請先輸入清單名稱。", true);
          return;
        }

        if (!content) {
          setStatus("目前沒有可儲存的內容。", true);
          return;
        }

        savedLists[name] = {
          content,
          updatedAt: new Date().toISOString(),
        };

        persistSavedLists();
        writePlaybackState();
        refreshSavedListOptions(name);
        setStatus(`已儲存清單：${name}`);
      }

      function loadSelectedList() {
        const name = savedListSelect.value;
        if (!name || !savedLists[name]) {
          setStatus("請先選擇要載入的清單。", true);
          return;
        }

        inputEl.value = savedLists[name].content;
        addNumberLabelsToInput();
        refreshPreviewFromInput();
        listNameInput.value = name;
        writePlaybackState();
        setStatus(`已載入清單：${name}`);
      }

      function deleteSelectedList() {
        const name = savedListSelect.value;
        if (!name || !savedLists[name]) {
          setStatus("請先選擇要刪除的清單。", true);
          return;
        }

        delete savedLists[name];
        persistSavedLists();
        refreshSavedListOptions();
        setStatus(`已刪除清單：${name}`);
      }

      function importTxtFile(file) {
        const reader = new FileReader();
        reader.onload = () => {
          const text = typeof reader.result === "string" ? reader.result : "";
          inputEl.value = text;
          addNumberLabelsToInput();
          refreshPreviewFromInput();
          writePlaybackState();
          setStatus("已從文字檔匯入內容。可直接播放或儲存成清單。");
        };
        reader.onerror = () => {
          setStatus("文字檔匯入失敗，請重試。", true);
        };
        reader.readAsText(file, "utf-8");
      }

      function exportCurrentList() {
        const content = inputEl.value.trim();
        if (!content) {
          setStatus("目前沒有可匯出的內容。", true);
          return;
        }

        const rawName = listNameInput.value.trim() || "youtube-playlist";
        const safeName = rawName.replace(/[<>:\"/\\\\|?*\\x00-\\x1f]/g, "_");
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = `${safeName}.txt`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        setStatus(`已匯出記事本檔：${safeName}.txt`);
      }

      window.onYouTubeIframeAPIReady = function () {
        ytPlayer = new YT.Player("player", {
          width: "100%",
          height: "100%",
          videoId: "",
          playerVars: {
            rel: 0,
            modestbranding: 1,
            playsinline: 1,
          },
          events: {
            onReady: () => {
              apiReady = true;
              if (pendingStart) {
                setStatus("播放器已就緒，正在自動開始播放。");
                startPlaybackFromInput();
              } else if (!tryResumePlayback()) {
                setStatus("播放器已就緒，請貼上連結後按開始播放。");
              } else {
                // 已在 tryResumePlayback 內顯示狀態
              }
            },
            onStateChange: (event) => {
              writePlaybackState();
              if (event.data === YT.PlayerState.ENDED) {
                nextVideo();
              }
            },
            onError: () => {
              setStatus("有影片無法播放，已嘗試切到下一支。", true);
              nextVideo();
            },
          },
        });
      };

      startBtn.addEventListener("click", startPlaybackFromInput);

      saveBtn.addEventListener("click", saveCurrentList);
      loadBtn.addEventListener("click", loadSelectedList);
      deleteBtn.addEventListener("click", deleteSelectedList);

      importBtn.addEventListener("click", () => fileInput.click());
      inputEl.addEventListener("blur", () => {
        addNumberLabelsToInput();
        refreshPreviewFromInput();
      });
      inputEl.addEventListener("paste", () => {
        window.setTimeout(() => {
          addNumberLabelsToInput();
          refreshPreviewFromInput();
        }, 0);
      });
      fileInput.addEventListener("change", (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        importTxtFile(file);
        event.target.value = "";
      });
      exportBtn.addEventListener("click", exportCurrentList);

      nextBtn.addEventListener("click", nextVideo);
      stopBtn.addEventListener("click", stopVideo);

      loadSavedLists();
      refreshSavedListOptions();
      restoreDraftFromPlaybackState();
      addNumberLabelsToInput();
      refreshPreviewFromInput();
      initPlaybackPersistenceEvents();

      setStatus("正在載入 YouTube API，載入完成後即可播放。");

      playbackSaveTimer = window.setInterval(() => {
        if (apiReady && ytPlayer) {
          writePlaybackState();
        }
      }, 5000);
    </script>
  </body>
</html>
