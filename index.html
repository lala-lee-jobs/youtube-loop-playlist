<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube 清單循環播放器</title>
    <script src="https://www.youtube.com/iframe_api" defer></script>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #22c55e;
        --accent-hover: #16a34a;
        --danger: #ef4444;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        background: radial-gradient(circle at top right, #1f2937, var(--bg));
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 24px;
      }

      .container {
        width: 100%;
        max-width: 980px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .card {
        background: color-mix(in oklab, var(--panel) 85%, black);
        border: 1px solid #374151;
        border-radius: 14px;
        padding: 16px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }

      h2 {
        margin: 0 0 8px;
        font-size: 1.05rem;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      textarea,
      input,
      select {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #4b5563;
        background: #030712;
        color: var(--text);
        padding: 10px 12px;
        font-size: 0.95rem;
      }

      textarea {
        min-height: 160px;
        resize: vertical;
        line-height: 1.4;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }

      .saved-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 12px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
      }

      #startBtn {
        background: var(--accent);
        color: #052e16;
      }

      #startBtn:hover {
        background: var(--accent-hover);
      }

      #nextBtn {
        background: #1d4ed8;
        color: #dbeafe;
      }

      #stopBtn {
        background: #374151;
        color: #f9fafb;
      }

      #saveBtn,
      #loadBtn,
      #importBtn,
      #exportBtn {
        background: #0ea5e9;
        color: #e0f2fe;
      }

      #deleteBtn {
        background: #b91c1c;
        color: #fee2e2;
      }

      #clearDebugBtn {
        background: #374151;
        color: #f9fafb;
      }

      .status {
        margin-top: 10px;
        font-size: 0.92rem;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      .player-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #000;
        border-radius: 12px;
        overflow: hidden;
      }

      #player {
        width: 100%;
        height: 100%;
      }

      .meta {
        margin-top: 10px;
        font-size: 0.95rem;
      }

      .debug-info {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .debug-log {
        margin-top: 10px;
        background: #030712;
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 10px;
        min-height: 120px;
        max-height: 240px;
        overflow: auto;
        font-size: 0.82rem;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .snapshot-box {
        margin-top: 10px;
        background: #030712;
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 10px;
        font-size: 0.85rem;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      code {
        background: #111827;
        padding: 1px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>YouTube 清單循環播放器</h1>
        <p>每行貼一個 YouTube 連結（或直接貼影片 ID），按「開始播放」後會自動循環。</p>
      </section>

      <section class="card">
        <textarea
          id="urlInput"
          placeholder="https://www.youtube.com/watch?v=dQw4w9WgXcQ
https://youtu.be/3JZ_D3ELwOQ
https://www.youtube.com/shorts/aqz-KE-bpKQ"
        ></textarea>

        <div class="controls">
          <button id="startBtn">開始播放</button>
          <button id="nextBtn" type="button">下一支</button>
          <button id="stopBtn" type="button">停止</button>
        </div>

        <div class="saved-row">
          <input id="listNameInput" type="text" placeholder="輸入清單名稱（例如：睡前歌單）" />
          <select id="savedListSelect">
            <option value="">請選擇已儲存清單</option>
          </select>
        </div>

        <div class="controls">
          <button id="saveBtn" type="button">儲存目前清單</button>
          <button id="loadBtn" type="button">載入選取清單</button>
          <button id="deleteBtn" type="button">刪除選取清單</button>
          <button id="importBtn" type="button">匯入記事本(txt)</button>
          <button id="exportBtn" type="button">匯出目前清單(txt)</button>
          <input id="fileInput" type="file" accept=".txt,text/plain" hidden />
        </div>

        <div id="status" class="status">尚未開始播放。</div>
      </section>

      <section class="card">
        <div class="player-wrap">
          <div id="player"></div>
        </div>
        <div id="meta" class="meta">目前播放：<code>-</code></div>
      </section>

      <section class="card">
        <h2>重載偵測與原因紀錄</h2>
        <div id="reloadInfo" class="debug-info">尚無資料</div>
        <div class="controls">
          <button id="clearDebugBtn" type="button">清除紀錄</button>
        </div>
        <pre id="reloadLog" class="debug-log">尚無事件紀錄。</pre>
        <div id="reloadSnapshot" class="snapshot-box">尚無重載前快照。</div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "yt-loop-player-saved-lists";
      const DEBUG_LOG_KEY = "yt-loop-player-debug-log";
      const DEBUG_SESSION_KEY = "yt-loop-player-session-id";
      const PLAYBACK_STATE_KEY = "yt-loop-player-playback-state";
      const PRE_RELOAD_SNAPSHOT_KEY = "yt-loop-player-pre-reload-snapshot";

      let ytPlayer;
      let queue = [];
      let currentIndex = 0;
      let apiReady = false;
      let pendingStart = false;
      let playbackSaveTimer = null;

      const statusEl = document.getElementById("status");
      const metaEl = document.getElementById("meta");
      const inputEl = document.getElementById("urlInput");
      const listNameInput = document.getElementById("listNameInput");
      const savedListSelect = document.getElementById("savedListSelect");
      const fileInput = document.getElementById("fileInput");
      const reloadInfoEl = document.getElementById("reloadInfo");
      const reloadLogEl = document.getElementById("reloadLog");
      const reloadSnapshotEl = document.getElementById("reloadSnapshot");

      const startBtn = document.getElementById("startBtn");
      const nextBtn = document.getElementById("nextBtn");
      const stopBtn = document.getElementById("stopBtn");
      const saveBtn = document.getElementById("saveBtn");
      const loadBtn = document.getElementById("loadBtn");
      const deleteBtn = document.getElementById("deleteBtn");
      const importBtn = document.getElementById("importBtn");
      const exportBtn = document.getElementById("exportBtn");
      const clearDebugBtn = document.getElementById("clearDebugBtn");

      let savedLists = {};

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      }

      function getSessionId() {
        const current = sessionStorage.getItem(DEBUG_SESSION_KEY);
        if (current) return current;
        const id = `s-${Date.now()}-${Math.floor(Math.random() * 10000)}`;
        sessionStorage.setItem(DEBUG_SESSION_KEY, id);
        return id;
      }

      function nowText() {
        return new Date().toLocaleString("zh-TW", { hour12: false });
      }

      function getNavigationType() {
        const nav = performance.getEntriesByType("navigation")[0];
        return nav ? nav.type : "unknown";
      }

      function inferLoadReason(navType) {
        if (navType === "reload") return "手動重新整理或程式觸發 reload";
        if (navType === "back_forward") return "返回/前進或 BFCache 還原";
        if (navType === "navigate") return "新開頁、輸入網址、或外部連結進入";
        return "無法判定";
      }

      function getPlayerStateLabel(state) {
        if (state === 0) return "ENDED(0)";
        if (state === 1) return "PLAYING(1)";
        if (state === 2) return "PAUSED(2)";
        if (state === 3) return "BUFFERING(3)";
        if (state === 5) return "CUED(5)";
        if (state === -1) return "UNSTARTED(-1)";
        return `UNKNOWN(${state})`;
      }

      function readDebugEvents() {
        try {
          const raw = localStorage.getItem(DEBUG_LOG_KEY);
          const events = raw ? JSON.parse(raw) : [];
          return Array.isArray(events) ? events : [];
        } catch (_) {
          return [];
        }
      }

      function writeDebugEvents(events) {
        try {
          localStorage.setItem(DEBUG_LOG_KEY, JSON.stringify(events.slice(-80)));
        } catch (_) {}
      }

      function renderDebugPanel() {
        const navType = getNavigationType();
        reloadInfoEl.textContent = `本次載入型態：${navType}；推測原因：${inferLoadReason(navType)}`;

        const events = readDebugEvents();
        if (!events.length) {
          reloadLogEl.textContent = "尚無事件紀錄。";
          return;
        }

        const lines = events
          .slice(-25)
          .map((event) => `[${event.time}] (${event.sessionId}) ${event.type} - ${event.detail}`);
        reloadLogEl.textContent = lines.join("\n");
        renderReloadSnapshotPanel();
      }

      function appendDebugEvent(type, detail) {
        const events = readDebugEvents();
        events.push({
          time: nowText(),
          sessionId: getSessionId(),
          type,
          detail,
        });
        writeDebugEvents(events);
        renderDebugPanel();
      }

      function readPreReloadSnapshot() {
        try {
          const raw = localStorage.getItem(PRE_RELOAD_SNAPSHOT_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : null;
        } catch (_) {
          return null;
        }
      }

      function writePreReloadSnapshot(trigger) {
        try {
          const state = readPlaybackState();
          if (!state) return;

          localStorage.setItem(
            PRE_RELOAD_SNAPSHOT_KEY,
            JSON.stringify({
              trigger,
              capturedAt: Date.now(),
              capturedAtText: nowText(),
              navTypeAtCapture: getNavigationType(),
              currentIndex: Number(state.currentIndex) || 0,
              currentTime: Number(state.currentTime) || 0,
              playerState: Number(state.playerState),
              queueLength: Array.isArray(state.queue) ? state.queue.length : 0,
              updatedAt: Number(state.updatedAt) || 0,
            })
          );
        } catch (_) {}
      }

      function renderReloadSnapshotPanel() {
        const snap = readPreReloadSnapshot();
        const currentNavType = getNavigationType();

        if (!snap) {
          reloadSnapshotEl.textContent = "尚無重載前快照。";
          return;
        }

        const ageSec = Math.max(0, Math.floor((Date.now() - (Number(snap.capturedAt) || 0)) / 1000));
        const likelyMessage =
          currentNavType === "reload"
            ? "判讀：這次是完整 reload（較像外部刷新/手動刷新，不是 BFCache 還原）。"
            : "判讀：這次不是完整 reload，可能是一般導頁或返回快取。";

        reloadSnapshotEl.textContent =
          `最近一次重載前快照\n` +
          `- 快照時間: ${snap.capturedAtText || "-"} (${ageSec} 秒前)\n` +
          `- 觸發事件: ${snap.trigger || "-"}\n` +
          `- 快照當下 navigation.type: ${snap.navTypeAtCapture || "-"}\n` +
          `- 播放清單長度: ${snap.queueLength ?? "-"}\n` +
          `- 播放位置: 第 ${(Number(snap.currentIndex) || 0) + 1} 支\n` +
          `- 秒數: ${Math.max(0, Number(snap.currentTime) || 0)} 秒\n` +
          `- 播放器狀態: ${getPlayerStateLabel(Number(snap.playerState))}\n` +
          `- 本次載入 navigation.type: ${currentNavType}\n` +
          `- ${likelyMessage}`;
      }

      function initReloadDebugMonitor() {
        appendDebugEvent("boot", `navigation.type=${getNavigationType()}`);

        window.addEventListener("pageshow", (event) => {
          appendDebugEvent("pageshow", `persisted=${event.persisted}`);
        });

        window.addEventListener("pagehide", (event) => {
          writePlaybackState();
          writePreReloadSnapshot("pagehide");
          appendDebugEvent("pagehide", `persisted=${event.persisted}`);
        });

        window.addEventListener("beforeunload", () => {
          writePlaybackState();
          writePreReloadSnapshot("beforeunload");
          appendDebugEvent("beforeunload", "即將離開頁面");
        });

        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "hidden") {
            writePlaybackState();
            writePreReloadSnapshot("visibilitychange:hidden");
          }
          appendDebugEvent("visibilitychange", `state=${document.visibilityState}`);
        });

        window.addEventListener("online", () => {
          appendDebugEvent("network", "online");
        });

        window.addEventListener("offline", () => {
          appendDebugEvent("network", "offline");
        });

        clearDebugBtn.addEventListener("click", () => {
          localStorage.removeItem(DEBUG_LOG_KEY);
          localStorage.removeItem(PRE_RELOAD_SNAPSHOT_KEY);
          renderDebugPanel();
          setStatus("已清除重載偵測紀錄。");
        });

        renderDebugPanel();
      }

      function readPlaybackState() {
        try {
          const raw = localStorage.getItem(PLAYBACK_STATE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : null;
        } catch (_) {
          return null;
        }
      }

      function writePlaybackState() {
        try {
          const parsedFromInput = parseQueue(inputEl.value);
          const effectiveQueue = queue.length ? queue : parsedFromInput;
          if (!effectiveQueue.length) return;

          const safeIndex = queue.length
            ? Math.max(0, Math.min(currentIndex, queue.length - 1))
            : 0;

          let currentTime = 0;
          let playerState = -1;
          if (ytPlayer && typeof ytPlayer.getCurrentTime === "function") {
            currentTime = Number(ytPlayer.getCurrentTime()) || 0;
          }
          if (ytPlayer && typeof ytPlayer.getPlayerState === "function") {
            playerState = Number(ytPlayer.getPlayerState());
          }

          localStorage.setItem(
            PLAYBACK_STATE_KEY,
            JSON.stringify({
              inputText: inputEl.value,
              listName: listNameInput.value || "",
              queue: effectiveQueue,
              currentIndex: safeIndex,
              currentTime: Math.max(0, Math.floor(currentTime)),
              playerState,
              updatedAt: Date.now(),
            })
          );
        } catch (_) {}
      }

      function restoreDraftFromPlaybackState() {
        const snapshot = readPlaybackState();
        if (!snapshot) return;

        if (!inputEl.value.trim() && typeof snapshot.inputText === "string") {
          inputEl.value = snapshot.inputText;
        }
        if (!listNameInput.value.trim() && typeof snapshot.listName === "string") {
          listNameInput.value = snapshot.listName;
        }
      }

      function tryResumePlayback() {
        const snapshot = readPlaybackState();
        if (!snapshot || !apiReady || !ytPlayer) return false;

        // 只恢復最近 24 小時內的播放，避免載入過舊狀態。
        const updatedAt = Number(snapshot.updatedAt) || 0;
        if (!updatedAt || Date.now() - updatedAt > 24 * 60 * 60 * 1000) {
          return false;
        }

        const sourceText =
          typeof snapshot.inputText === "string" && snapshot.inputText.trim()
            ? snapshot.inputText
            : inputEl.value;
        const parsed = parseQueue(sourceText);
        if (!parsed.length) return false;

        inputEl.value = sourceText;
        if (typeof snapshot.listName === "string" && snapshot.listName.trim()) {
          listNameInput.value = snapshot.listName;
        }

        queue = parsed;
        currentIndex = Math.max(0, Math.min(Number(snapshot.currentIndex) || 0, queue.length - 1));
        renderMeta();

        const videoId = queue[currentIndex];
        const startSeconds = Math.max(0, Number(snapshot.currentTime) || 0);
        const state = Number(snapshot.playerState);

        if (state === YT.PlayerState.PAUSED || state === YT.PlayerState.CUED) {
          ytPlayer.cueVideoById({ videoId, startSeconds });
          setStatus(`已還原播放清單，停在第 ${currentIndex + 1} 支 ${startSeconds} 秒。`);
        } else {
          ytPlayer.loadVideoById({ videoId, startSeconds });
          setStatus(`已自動續播：第 ${currentIndex + 1} 支，從 ${startSeconds} 秒繼續。`);
        }

        appendDebugEvent("resume", `index=${currentIndex}, sec=${startSeconds}, state=${state}`);
        return true;
      }

      function startPlaybackFromInput() {
        queue = parseQueue(inputEl.value);

        if (!queue.length) {
          setStatus("沒有解析到有效的 YouTube 連結或影片 ID。", true);
          renderMeta();
          return;
        }

        if (!apiReady || !ytPlayer) {
          pendingStart = true;
          setStatus("YouTube API 載入中，完成後會自動開始播放。");
          return;
        }

        pendingStart = false;
        currentIndex = 0;
        renderMeta();
        playAt(0);
      }

      function loadSavedLists() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          savedLists = raw ? JSON.parse(raw) : {};
        } catch (_) {
          savedLists = {};
        }
      }

      function persistSavedLists() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(savedLists));
      }

      function refreshSavedListOptions(selectedName = "") {
        savedListSelect.innerHTML = '<option value="">請選擇已儲存清單</option>';
        const names = Object.keys(savedLists).sort((a, b) => a.localeCompare(b, "zh-Hant"));

        for (const name of names) {
          const option = document.createElement("option");
          option.value = name;
          option.textContent = name;
          savedListSelect.appendChild(option);
        }

        if (selectedName && savedLists[selectedName]) {
          savedListSelect.value = selectedName;
        }
      }

      function extractVideoId(line) {
        const value = line.trim();
        if (!value) return null;

        if (/^[a-zA-Z0-9_-]{11}$/.test(value)) {
          return value;
        }

        try {
          const url = new URL(value);

          if (url.hostname.includes("youtu.be")) {
            const id = url.pathname.split("/").filter(Boolean)[0];
            return id && id.length === 11 ? id : null;
          }

          if (url.searchParams.get("v")) {
            const id = url.searchParams.get("v");
            return id && id.length === 11 ? id : null;
          }

          const parts = url.pathname.split("/").filter(Boolean);
          const shortsIndex = parts.indexOf("shorts");
          if (shortsIndex >= 0 && parts[shortsIndex + 1]) {
            const id = parts[shortsIndex + 1];
            return id.length === 11 ? id : null;
          }

          const embedIndex = parts.indexOf("embed");
          if (embedIndex >= 0 && parts[embedIndex + 1]) {
            const id = parts[embedIndex + 1];
            return id.length === 11 ? id : null;
          }
        } catch (_) {
          return null;
        }

        return null;
      }

      function parseQueue(rawText) {
        const lines = rawText
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean);

        const ids = [];
        for (const line of lines) {
          const id = extractVideoId(line);
          if (id) ids.push(id);
        }

        return [...new Set(ids)];
      }

      function renderMeta() {
        if (!queue.length) {
          metaEl.innerHTML = "目前播放：<code>-</code>";
          return;
        }

        metaEl.innerHTML = `目前播放：第 <code>${currentIndex + 1}</code> / <code>${queue.length}</code> 支，ID <code>${queue[currentIndex]}</code>`;
      }

      function playAt(index) {
        if (!ytPlayer || !queue.length) return;
        currentIndex = (index + queue.length) % queue.length;
        const videoId = queue[currentIndex];
        ytPlayer.loadVideoById(videoId);
        renderMeta();
        writePlaybackState();
        setStatus(`正在播放第 ${currentIndex + 1} 支影片。`);
      }

      function nextVideo() {
        if (!queue.length) {
          setStatus("清單是空的，請先貼上連結。", true);
          return;
        }
        playAt(currentIndex + 1);
      }

      function stopVideo() {
        if (ytPlayer && typeof ytPlayer.stopVideo === "function") {
          ytPlayer.stopVideo();
          writePlaybackState();
          setStatus("已停止播放。");
        }
      }

      function saveCurrentList() {
        const name = listNameInput.value.trim();
        const content = inputEl.value.trim();

        if (!name) {
          setStatus("請先輸入清單名稱。", true);
          return;
        }

        if (!content) {
          setStatus("目前沒有可儲存的內容。", true);
          return;
        }

        savedLists[name] = {
          content,
          updatedAt: new Date().toISOString(),
        };

        persistSavedLists();
        writePlaybackState();
        refreshSavedListOptions(name);
        setStatus(`已儲存清單：${name}`);
      }

      function loadSelectedList() {
        const name = savedListSelect.value;
        if (!name || !savedLists[name]) {
          setStatus("請先選擇要載入的清單。", true);
          return;
        }

        inputEl.value = savedLists[name].content;
        listNameInput.value = name;
        writePlaybackState();
        setStatus(`已載入清單：${name}`);
      }

      function deleteSelectedList() {
        const name = savedListSelect.value;
        if (!name || !savedLists[name]) {
          setStatus("請先選擇要刪除的清單。", true);
          return;
        }

        delete savedLists[name];
        persistSavedLists();
        refreshSavedListOptions();
        setStatus(`已刪除清單：${name}`);
      }

      function importTxtFile(file) {
        const reader = new FileReader();
        reader.onload = () => {
          const text = typeof reader.result === "string" ? reader.result : "";
          inputEl.value = text;
          writePlaybackState();
          setStatus("已從文字檔匯入內容。可直接播放或儲存成清單。");
        };
        reader.onerror = () => {
          setStatus("文字檔匯入失敗，請重試。", true);
        };
        reader.readAsText(file, "utf-8");
      }

      function exportCurrentList() {
        const content = inputEl.value.trim();
        if (!content) {
          setStatus("目前沒有可匯出的內容。", true);
          return;
        }

        const rawName = listNameInput.value.trim() || "youtube-playlist";
        const safeName = rawName.replace(/[<>:\"/\\\\|?*\\x00-\\x1f]/g, "_");
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = `${safeName}.txt`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        setStatus(`已匯出記事本檔：${safeName}.txt`);
      }

      window.onYouTubeIframeAPIReady = function () {
        ytPlayer = new YT.Player("player", {
          width: "100%",
          height: "100%",
          videoId: "",
          playerVars: {
            rel: 0,
            modestbranding: 1,
            playsinline: 1,
          },
          events: {
            onReady: () => {
              apiReady = true;
              if (pendingStart) {
                setStatus("播放器已就緒，正在自動開始播放。");
                startPlaybackFromInput();
              } else if (!tryResumePlayback()) {
                setStatus("播放器已就緒，請貼上連結後按開始播放。");
              } else {
                // 已在 tryResumePlayback 內顯示狀態
              }
            },
            onStateChange: (event) => {
              writePlaybackState();
              if (event.data === YT.PlayerState.ENDED) {
                nextVideo();
              }
            },
            onError: () => {
              setStatus("有影片無法播放，已嘗試切到下一支。", true);
              nextVideo();
            },
          },
        });
      };

      startBtn.addEventListener("click", startPlaybackFromInput);

      saveBtn.addEventListener("click", saveCurrentList);
      loadBtn.addEventListener("click", loadSelectedList);
      deleteBtn.addEventListener("click", deleteSelectedList);

      importBtn.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        importTxtFile(file);
        event.target.value = "";
      });
      exportBtn.addEventListener("click", exportCurrentList);

      nextBtn.addEventListener("click", nextVideo);
      stopBtn.addEventListener("click", stopVideo);

      loadSavedLists();
      refreshSavedListOptions();
      restoreDraftFromPlaybackState();
      initReloadDebugMonitor();

      setStatus("正在載入 YouTube API，載入完成後即可播放。");

      playbackSaveTimer = window.setInterval(() => {
        if (apiReady && ytPlayer) {
          writePlaybackState();
        }
      }, 5000);
    </script>
  </body>
</html>
